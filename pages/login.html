<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAU Community Marketplace</title>

  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- GOOGLE LOGIN -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="login-page">

<!-- ===== TOP BRANDING ===== -->
<div class="brand-header">
  <h1>SAU COMMUNITY MARKETPLACE</h1>
  <p>Buy. Sell. Connect — within SAU.</p>
</div>

<!-- ===== LOGIN SECTION ===== -->
<div class="login-container">

  <div class="login-box">

    <h2 id="formTitle">Welcome Back</h2>

    <!-- ================= LOGIN ================= -->
    <div id="loginForm" class="form active">

      <form onsubmit="event.preventDefault(); login();">
        <input type="text" placeholder="Mobile No / Email" id="loginUser">
        <input type="password" placeholder="Password" id="loginPass">

        <button type="submit">Login</button>
      </form>

      <!-- GOOGLE LOGIN -->
      <div id="g_id_onload"
           data-client_id="971838183531-eoco2ogo1j9p8v3slkl2rbrtsagtq1p5.apps.googleusercontent.com"
           data-callback="handleCredentialResponse">
      </div>

      <div class="g_id_signin" data-type="standard"></div>

      <p class="links">
        <span onclick="showForgot()">Forgot Password?</span>
        <span onclick="showRegister()">Register Now</span>
      </p>
    </div>

    <!-- ================= REGISTER ================= -->
    <div id="registerForm" class="form">

      <form onsubmit="event.preventDefault(); register();">
        <input type="text" placeholder="Full Name" id="regName">
        <input type="email" placeholder="Email" id="regEmail">
        <input type="text" placeholder="Mobile No" id="regMobile">
        <input type="password" placeholder="Set Password" id="regPass">

        <button type="submit">Register</button>
      </form>

      <p class="links">
        <span onclick="showLogin()">Back to Login</span>
      </p>
    </div>

    <!-- ================= FORGOT PASSWORD ================= -->
    <div id="forgotForm" class="form">

      <form onsubmit="event.preventDefault(); sendOTP();">
        <input type="email" placeholder="Enter Email" id="forgotEmail">

        <button type="submit">Send OTP</button>
      </form>

      <p class="links">
        <span onclick="resendOTP()">Resend OTP</span>
        <span onclick="showLogin()">Back to Login</span>
      </p>
    </div>

    <!-- ================= RESET PASSWORD ================= -->
    <div id="resetForm" class="form">

      <form onsubmit="event.preventDefault(); resetPassword();">
        <input type="text" placeholder="Enter OTP" id="otp">
        <input type="password" placeholder="New Password" id="newPass">

        <button type="submit">Reset Password</button>
      </form>

      <p class="links">
        <span onclick="resendOTP()">Resend OTP</span>
        <span onclick="showLogin()">Back to Login</span>
      </p>
    </div>

  </div>

</div>

<!-- SCRIPT -->
<script src="../js/app.js"></script>

</body>
</html>
